services:
  # ─── Core service (always started) ────────────────────────────────────────
  document-xml-mcp:
    build: .
    volumes:
      - ./input:/input:ro
      - ./output:/output
    environment:
      XML_PROCESSING_ALLOWED_INPUT_DIRS: /input
      XML_PROCESSING_ALLOWED_OUTPUT_DIRS: /output
      XML_PROCESSING_LOG_LEVEL: INFO
      # Override to "sse" when using the n8n profile (set automatically below)
      MCP_TRANSPORT: ${MCP_TRANSPORT:-stdio}
    ports:
      # SSE port — only relevant when MCP_TRANSPORT=sse
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; s=socket.create_connection(('localhost',8000),timeout=2)"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ─── n8n (optional — start with: docker compose --profile n8n up) ─────────
  n8n:
    image: docker.n8n.io/n8nio/n8n:latest
    profiles: [n8n]
    ports:
      - "5678:5678"
    environment:
      # n8n base URL — update to your hostname/IP if accessing from another machine
      N8N_HOST: localhost
      N8N_PORT: 5678
      N8N_PROTOCOL: http
      WEBHOOK_URL: http://localhost:5678/
      # Persist credentials and workflows across container restarts
      N8N_ENCRYPTION_KEY: changeme-use-a-long-random-string
      # Allow the n8n instance to reach the MCP server inside Docker
      NODE_FUNCTION_ALLOW_EXTERNAL: "*"
    volumes:
      - n8n_data:/home/node/.n8n
    depends_on:
      document-xml-mcp:
        condition: service_healthy
    restart: unless-stopped

  # ─── Ollama with GPU (optional — start with: docker compose --profile ollama up) ──
  ollama:
    image: ollama/ollama:latest
    profiles: [ollama]
    ports:
      # Host port 11435 avoids conflict with any Ollama already running on host:11434
      - "11435:11434"
    volumes:
      # Mount host ~/.ollama so all locally-downloaded models are instantly available.
      # New models pulled inside the container are also saved back to the host directory.
      - ${USERPROFILE}/.ollama:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:11434/v1/models"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  n8n_data:
